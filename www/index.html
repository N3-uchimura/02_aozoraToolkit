<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <title>Aozora Toolkit</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline';">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/button.css">
</head>

<body>
  <h1 id="maintitle">Aozora Toolkit</h1>
  <div class="operation_area">
    <button id="scrape_button" class="button-g button-wide" value="merge"
      onclick="transfer('scrape_page');">Scrape</button>
  </div>
  <div class="operation_area">
    <button id="edit_button" class="button-g button-wide" value="edit" onclick="transfer('edit_page');">Edit</button>
  </div>
  <div class="operation_area">
    <button id="convert_button" class="button-g button-wide" value="convert"
      onclick="transfer('convert_page');">Convert</button>
  </div>
  <div class="operation_area">
    <button id="merge_button" class="button-g button-wide" value="merge"
      onclick="transfer('merge_page');">Merge</button>
  </div>
  <hr>
  <div class="config_area">
    <button id="config_button" class="button-g button-6 button-wide" value="config"
      onclick="transfer('config_page');">Config</button>
  </div>
  </div>
  <div class="exit_area">
    <button id="exit_button" class="button-g button-1 button-wide" value="exit"
      onclick="transfer('exit_page');">Exit</button>
  </div>
  <footer>
    <p><small>&copy; 2026 Nthree All Rights Reserved. </small></p>
  </footer>

  <script charset='UTF-8'>
    /// japanese
    const APPNAME_STR_JA = '青空ツールキット';
    const CONFIG_STR_JA = '設定';
    const EXIT_STR_JA = '終了';
    const SCRAPING_STR_JA = 'スクレイピング';
    const EDIT_STR_JA = '文書編集';
    const CONVERT_STR_JA = 'ファイル変換';
    const MERGE_STR_JA = 'ファイル結合';
    /// english
    const APPNAME_STR_EN = 'Aozora Toolkit';
    const CONFIG_STR_EN = 'Config';
    const EXIT_STR_EN = 'Exit';
    const SCRAPING_STR_EN = 'Scrape';
    const EDIT_STR_EN = 'Edit';
    const CONVERT_STR_EN = 'Convert';
    const MERGE_STR_EN = 'Merge';

    /// doms
    // common
    const maintitleDom = document.getElementById('maintitle');
    const configButtonDom = document.getElementById('config_button');
    const exitButtonDom = document.getElementById('exit_button');
    const scrapeButtonDom = document.getElementById('scrape_button');
    const editButtonDom = document.getElementById('edit_button');
    const convertButtonDom = document.getElementById('convert_button');
    const mergeButtonDom = document.getElementById('merge_button');

    /// ipc
    // before ready
    window.api.send('beforeready');

    // be ready
    window.api.on('ready', arg => {
      console.log('ready');
      // change language
      changeLanguage(arg);
    });

    // page transfer
    const transfer = channel => {
      try {
        // transfer
        window.api.send('page', channel);

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // change language
    const changeLanguage = lang => {
      // japanese
      if (lang == 'japanese') {
        document.title = APPNAME_STR_JA;
        maintitleDom.innerHTML = APPNAME_STR_JA;
        scrapeButtonDom.innerHTML = SCRAPING_STR_JA;
        editButtonDom.innerHTML = EDIT_STR_JA;
        convertButtonDom.innerHTML = CONVERT_STR_JA;
        mergeButtonDom.innerHTML = MERGE_STR_JA;
        configButtonDom.innerHTML = CONFIG_STR_JA;
        exitButtonDom.innerHTML = EXIT_STR_JA;
        document.documentElement.setAttribute('lang', 'ja');
        // english
      } else {
        document.title = APPNAME_STR_EN;
        maintitleDom.innerHTML = APPNAME_STR_EN;
        scrapeButtonDom.innerHTML = SCRAPING_STR_EN;
        editButtonDom.innerHTML = EDIT_STR_EN;
        convertButtonDom.innerHTML = CONVERT_STR_EN;
        mergeButtonDom.innerHTML = MERGE_STR_EN;
        configButtonDom.innerHTML = CONFIG_STR_EN;
        exitButtonDom.innerHTML = EXIT_STR_EN;
        document.documentElement.setAttribute('lang', 'en');
      }
    }
  </script>
</body>

</html>
