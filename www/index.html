<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <title>Aozora Toolkit</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline';">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/button.css">
</head>

<body>
  <h1 id="maintitle">Aozora Toolkit</h1>
  <div class="operation_area">
    <button id="open_button" class="button-g button-6 button-wide" value="open" onclick="gotoOpen()">Open</button>
  </div>
  <hr>
  <div>
    <input id="file" type="radio" name="mode" value="file" onchange="radioChanged(this.value)" checked><label
      id="filelabel" for="file">GetFile</label>
    <input id="book" type="radio" name="mode" value="book" onchange="radioChanged(this.value)"><label id="booklabel"
      for="book">GetBook</label>
    <input id="author" type="radio" name="mode" value="author" onchange="radioChanged(this.value)"><label
      id="authorlabel" for="author">GetAuthor</label>
    <input id="title" type="radio" name="mode" value="title" onchange="radioChanged(this.value)"><label id="titlelabel"
      for="title">GetTitle</label>
  </div>
  <div id="startnum_area" class="number01 display-none">
    <h3 id="startnumHead">Start number (1-2410)</h3>
    <input id="startnum" type="number" min="1" max="2410" value="1">
  </div>
  <div id="endnum_area" class="number01 display-none">
    <h3 id="endnumHead">End number (2-2410)</h3>
    <input id="endnum" type="number" min="2" max="2410" value="2410">
  </div>
  <div id="select_en" class="cp_ipselect02">
    <select id="starten" name="start">
      <option value="all">all</option>
      <option value="a">a</option>
      <option value="ka">ka</option>
      <option value="sa">sa</option>
      <option value="ta">ta</option>
      <option value="na">na</option>
      <option value="ha">ha</option>
      <option value="ma">ma</option>
      <option value="ya">ya</option>
      <option value="ra">ra</option>
      <option value="wa">wa</option>
      <option value="a-z">a-z</option>
    </select>
  </div>
  <div id="select_ja" class="cp_ipselect02">
    <select id="startja" name="start">
      <option value="all">全</option>
      <option value="a">あ</option>
      <option value="ka">か</option>
      <option value="sa">さ</option>
      <option value="ta">た</option>
      <option value="na">な</option>
      <option value="ha">は</option>
      <option value="ma">ま</option>
      <option value="ya">や</option>
      <option value="ra">ら</option>
      <option value="wa">わ</option>
      <option value="a-z">a-z</option>
    </select>
  </div>
  <div class="operation_area">
    <button id="scraping_button" class="button-g button-wide" value="scraping"
      onclick="gotoScrape();">Scrape</button><br><br>
    <button id="pause_button" class="button-g button-4 button-wide" onclick="pauseScrape();">Pause</button>
  </div>
  <hr>
  <div class="operation_area">
    <h3 id="extract">Extract</h3>
    <button id="extract_button" class="button-g button-wide" value="extract" onclick="gotoExtract()">Extract</button>
  </div>
  <div class="operation_area">
    <h3 id="modify">Modify</h3>
    <button id="modify_button" class="button-g button-wide" value="modify" onclick="gotoModify();">Modify</button>
  </div>
  <div class="operation_area">
    <h3 id="rename">Rename</h3>
    <button id="rename_button" class="button-g button-wide" value="rename" onclick="gotoRename()">Rename</button>
  </div>
  <div class="operation_area">
    <h3 id="split">Split</h3>
    <button id="split_button" class="button-g button-wide" value="split" onclick="gotoSplit()">Split</button>
  </div>
  <div class="extra_area">
    <h3 id="extra">Extra</h3>
    <div id="selectarea">
      <input type="radio" name="mode" value="first" checked><label id="firstlabel" for="first">1st line</label>
      <input type="radio" name="mode" value="firstplus"><label id="firstpluslabel" for="firstplus">1st
        line*</label>
      <input type="radio" name="mode" value="second"><label id="secondlabel" for="second">2nd line</label>
      <input type="radio" name="mode" value="third"><label id="thirdlabel" for="third">3rd line</label>
    </div>
    <button id="extra_button" class="button-g button-6 button-wide" value="extra" onclick="gotoExtra()">Extra</button>
  </div>
  <hr>
  <div class="operation_area">
    <h3 id="selectdir">Select Directory</h3>
    <button id="selectdir_button" class="button-g button-wide" value="selectdir" onclick="gotoSelectDir();">Select
      Directory</button>
  </div>
  <div class="operation_area">
    <h3 id="converter">Convert</h3>
    <label id="converttolabel" for="convertto">convertto</label>
    <div>
      <input type="radio" id="m4a" name="convert" value="m4a">
      <label for="m4a">m4a</label>
    </div>
    <div>
      <input type="radio" id="flac" name="convert" value="flac">
      <label for="flac">flac</label>
    </div>
    <label id="qualitylabel" for="quality">quality</label>
    <input type="number" id="quality" name="quality" min="48" max="320" value="92" /><br><br>
    <label id="samplingratelabel" for="samplingrate">sampling rate</label>
    <select name="samplingrate" id="samplingrate">
      <option value="11025">11025 Hz</option>
      <option value="22050">22050 Hz</option>
      <option value="44100" selected>44100 Hz</option>
      <option value="88200">88200 Hz</option>
      <option value="96000">96000 Hz</option>
      <option value="192000">192000 Hz</option>
    </select><br><br>
    <button id="convert_button" class="button-g button-wide" value="convert" onclick="gotoConvert();">Convert</button>
  </div>
  <hr>
  <div class="operation_area">
    <h3 id="merge">Merge</h3>
    <button id="merge_button" class="button-g button-wide" value="merge" onclick="gotoMerge();">Merge</button>
  </div>
  <div class="operation_area">
    <h3 id="delete">Delete</h3>
    <button id="delete_button" class="button-g button-wide" value="delete" onclick="gotoDelete();">Delete</button>
  </div>
  <hr>
  <div class="config_area">
    <h3 id="config">Config</h3>
    <button id="config_button" class="button-g button-6 button-wide" value="config"
      onclick="gotoConfig()">Config</button>
  </div>
  </div>
  <div class="exit_area">
    <button id="exit_button" class="button-g button-1 button-wide" value="exit" onclick="exitApp();">Exit</button>
  </div>
  <footer>
    <p><small>&copy; 2026 Nthree All Rights Reserved. </small></p>
  </footer>

  <script charset="UTF-8">
    /// japanese
    // common
    const APPNAME_STR_JA = '青空ツールキット';
    const OPENDIR_STR_JA = 'フォルダ開く';
    const STATUS_STR_JA = 'ステータス';
    const CONFIG_STR_JA = '設定';
    const EXIT_STR_JA = '終了';
    // scraping
    const SCRAPING_STR_JA = 'スクレイピング';
    const GETFILES_STR_JA = 'ファイル取得';
    const GETBOOKS_STR_JA = '作品取得';
    const GETAUTHORS_STR_JA = '著者取得';
    const GETTITLES_STR_JA = 'タイトル取得';
    const STARTNUM_STR_JA = '開始位置(1-2410)';
    const ENDNUM_STR_JA = '終了位置(2-2410)';
    // editing
    const EXTRACT_STR_JA = 'ZIP解凍';
    const MODIFY_STR_JA = 'TXT修正';
    const RENAME_STR_JA = 'リネーム';
    const SPLIT_STR_JA = '分割';
    const FIRST_STR_JA = '1行目';
    const FIRSTPLIS_STR_JA = '1行目*';
    const SECOND_STR_JA = '2行目';
    const THIRD_STR_JA = '3行目';
    const INTRO_STR_JA = '先頭抽出';
    // converting
    const SELECTDIR_STR_JA = 'フォルダ選択';
    const QUALITY_STR_JA = '音声品質';
    const SAMPLINGRATE_STR_JA = 'サンプリング周波数';
    const CONVERTTO_STR_JA = '変換先形式名';
    const CONVERT_STR_JA = 'ファイル変換';
    /// merging
    const MERGE_STR_JA = 'ファイル結合';
    const DELETE_STR_JA = 'クリア';

    /// english
    // common
    const APPNAME_STR_EN = 'Aozora Toolkit';
    const OPENDIR_STR_EN = 'OpenDir';
    const STATUS_STR_EN = 'Status';
    const CONFIG_STR_EN = 'Config';
    const EXIT_STR_EN = 'Exit';
    // scraping
    const SCRAPING_STR_EN = 'Scrape';
    const GETFILES_STR_EN = 'GetFiles';
    const GETBOOKS_STR_EN = 'GetBooks';
    const GETAUTHORS_STR_EN = 'GetAuthors';
    const GETTITLES_STR_EN = 'GetTitles';
    const STARTNUM_STR_EN = 'Start number (1-2410)';
    const ENDNUM_STR_EN = 'End number (2-2410)';
    // editing
    const EXTRACT_STR_EN = 'Extract';
    const MODIFY_STR_EN = 'Modify';
    const RENAME_STR_EN = 'Rename';
    const SPLIT_STR_EN = 'Split';
    const FIRST_STR_EN = '1st line';
    const FIRSTPLIS_STR_EN = '1 line*';
    const SECOND_STR_EN = '2nd line';
    const THIRD_STR_EN = '3rd line';
    const INTRO_STR_EN = 'Extra';
    // converting
    const SELECTDIR_STR_EN = 'Select Directory';
    const QUALITY_STR_EN = 'quality';
    const SAMPLINGRATE_STR_EN = 'sampling rate';
    const CONVERTTO_STR_EN = 'ConvertTo';
    const CONVERT_STR_EN = 'Convert';
    /// merging
    const MERGE_STR_EN = 'Merge';
    const DELETE_STR_EN = 'Delete';

    /// doms
    // common
    const maintitleDom = document.getElementById("maintitle");
    const opendirButtonDom = document.getElementById('open_button');
    const statusDom = document.getElementById('status');
    const errorDom = document.getElementById('error');
    const statusHeadDom = document.getElementById('statushead');
    const pageDom = document.getElementById('targetpage');
    const configDom = document.getElementById('config');
    const configButtonDom = document.getElementById('config_button');
    const exitButtonDom = document.getElementById('exit_button');
    // scraping
    const selectJaDom = document.getElementById("select_ja");
    const selectEnDom = document.getElementById("select_en");
    const startNumDom = document.getElementById("startnum");
    const endNumDom = document.getElementById("endnum");
    const startAreaNumDom = document.getElementById("startnum_area");
    const endAreaNumDom = document.getElementById("endnum_area");
    const startHeadNumDom = document.getElementById("startnumHead");
    const endHeadNumDom = document.getElementById("endnumHead");
    const startJaDom = document.getElementById("startja");
    const startEnDom = document.getElementById("starten");
    const getfileDom = document.getElementById('filelabel');
    const getbookDom = document.getElementById('booklabel');
    const getauthorDom = document.getElementById('authorlabel');
    const gettitleDom = document.getElementById('titlelabel');
    const scrapeButtonDom = document.getElementById('scraping_button');
    const extractDom = document.getElementById('extract');
    const extractButtonDom = document.getElementById('extract_button');
    // editing
    const modifyDom = document.getElementById('modify');
    const modifyButtonDom = document.getElementById('modify_button');
    const renameDom = document.getElementById('rename');
    const renameButtonDom = document.getElementById('rename_button');
    const splitDom = document.getElementById('split');
    const splitButtonDom = document.getElementById('split_button');
    const firstLabelDom = document.getElementById('firstlabel');
    const firstPlusLabelDom = document.getElementById('firstpluslabel');
    const firstDom = document.getElementById('first');
    const firstPlusDom = document.getElementById('firstplus');
    const secondLabelDom = document.getElementById('secondlabel');
    const thirdLabelDom = document.getElementById('thirdlabel');
    const secondDom = document.getElementById('second');
    const extraDom = document.getElementById('extra');
    const extraButtonDom = document.getElementById('extra_button');
    // converting
    const selectdirButtonDom = document.getElementById('selectdir_button');
    const converttolabelDom = document.getElementById('converttolabel');
    const convertButtonDom = document.getElementById('convert_button');
    const qualitylabelDom = document.getElementById('qualitylabel');
    const qualityDom = document.getElementById('quality');
    const samplingratelabelDom = document.getElementById('samplingratelabel');
    const samplingrateDom = document.getElementById('samplingrate');
    const m4aDom = document.getElementById('m4a');
    const flacDom = document.getElementById('flac');
    const checkedConvertRadio = document.querySelector('input[name="convert"]:checked');
    // merging
    const mergeDom = document.getElementById('merge');
    const mergeButtonDom = document.getElementById('merge_button');
    const deleteDom = document.getElementById('delete');
    const deleteButtonDom = document.getElementById('delete_button');

    /// ipc
    // before ready
    window.api.send("beforeready");

    // be ready
    window.api.on("ready", arg => {
      console.log('ready');
      // change language
      changeLanguage(arg);
    });

    // update status
    window.api.on('statusUpdate', arg => {
      try {
        // status
        statusDom.innerHTML = `
          scraping: ${arg.status}`;
        // target
        pageDom.innerHTML = `
          target: ${arg.target}`;

      } catch (e) {
        // error
        console.log(e);
      }
    });

    // update error
    window.api.on('errorUpdate', arg => {
      try {
        console.log(arg);
        // error 
        errorDom.innerHTML = arg;

      } catch (e) {
        // error
        console.log(e);
      }
    });

    /// scraping
    // start scraping
    const gotoScrape = () => {
      try {
        // start
        let tmpStart = '';
        // get radio
        const value = document.querySelector("input[name='mode']:checked").value;
        // get select
        if (globalLanguage == 'japanese') {
          tmpStart = startJaDom.value;
        } else {
          tmpStart = startEnDom.value;
        }

        // mode switch
        switch (value) {
          // file mode
          case "file":
            // file scrape
            window.api.send('download', tmpStart);
            break;

          // book mode
          case "book":
            // bookscrape
            window.api.send('bookscrape', tmpStart);
            break;

          // title mode
          case "title":
            // title scrape
            window.api.send('titlescrape', tmpStart);
            break;

          // author mode
          case "author":
            const tmpObj = {
              start: startNumDom.value,
              end: endNumDom.value
            }
            // author scrape
            window.api.send('authorscrape', tmpObj);
            break;

          default:
            console.log('invalid mode');
        }

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // pause Scraping
    const pauseScrape = () => {
      try {
        // pause Scraping
        window.api.send("pause");
      } catch (e) {
        // error
        console.log(e);
      }
    }

    // on radio changed
    const radioChanged = (value) => {
      try {
        // initialize form
        if (value === 'author') {
          startAreaNumDom.classList.remove("display-none");
          endAreaNumDom.classList.remove("display-none");
          // japanese
          if (globalLanguage == 'japanese') {
            selectJaDom.classList.add("display-none");
          } else {
            selectEnDom.classList.add("display-none");
          }
        } else {
          startAreaNumDom.classList.add("display-none");
          endAreaNumDom.classList.add("display-none");
          // japanese
          if (globalLanguage == 'japanese') {
            selectJaDom.classList.remove("display-none");
          } else {
            selectEnDom.classList.remove("display-none");
          }
        }

      } catch (e) {
        // error
        console.log(e);
      }
    }

    /// editing
    // start extracting
    const gotoExtract = () => {
      try {
        console.log('extracting');
        // extract
        window.api.send('extract');

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // start modifying
    const gotoModify = () => {
      try {
        console.log('modifying');
        // modify
        window.api.send('modify');

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // start renaming
    const gotoRename = () => {
      try {
        console.log('renaming');
        // rename
        window.api.send('rename');

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // start splitting
    const gotoSplit = () => {
      try {
        console.log('splitting');
        // split
        window.api.send('split');

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // extra function
    const gotoExtra = () => {
      try {
        console.log('extra');
        // get selected
        const value = document.querySelector("input[name='mode']:checked").value;
        // extra
        window.api.send('extra', value);

      } catch (e) {
        // error
        console.log(e);
      }
    }

    /// converting
    // start selectdir
    const gotoSelectDir = () => {
      try {
        console.log('select dir');
        // directory selected
        const tmpSelectedDir = selectdirDom.value;
        // selectdir
        window.api.send('selectdir', tmpSelectedDir);

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // start converting
    const gotoConvert = () => {
      try {
        console.log('converting');
        // get checked
        const checkedValue = document.querySelector("input[name='convert']:checked").value;
        // send obj
        const sendobj = {
          quality: qualityDom.value,
          rate: samplingrateDom.value,
          type: checkedValue,
        }
        // convert
        window.api.send('convert', sendobj);

      } catch (e) {
        // error
        console.log(e);
      }
    }

    /// merging
    // start merging
    const gotoMerge = () => {
      try {
        console.log('merging');
        // merge
        window.api.send('merge');

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // start deleting
    const gotoDelete = () => {
      try {
        console.log('deleting');
        // delete
        window.api.send('delete');

      } catch (e) {
        // error
        console.log(e);
      }
    }

    /// common
    // goto open dir
    const gotoOpen = () => {
      try {
        // scrape
        window.api.send('open');

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // goto config page
    const gotoConfig = () => {
      try {
        console.log('goto config');
        // config
        window.api.send('config');

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // exit
    const exitApp = () => {
      try {
        console.log('exit');
        // exit app
        window.api.send('exit');

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // change language
    const changeLanguage = lang => {
      // japanese
      if (lang == 'japanese') {
        document.title = APPNAME_STR_JA;
        maintitleDom.innerHTML = APPNAME_STR_JA;
        extractDom.innerHTML = EXTRACT_STR_JA;
        extractButtonDom.innerHTML = EXTRACT_STR_JA;
        modifyDom.innerHTML = MODIFY_STR_JA;
        modifyButtonDom.innerHTML = MODIFY_STR_JA;
        renameDom.innerHTML = RENAME_STR_JA;
        renameButtonDom.innerHTML = RENAME_STR_JA;
        splitDom.innerHTML = SPLIT_STR_JA;
        splitButtonDom.innerHTML = SPLIT_STR_JA;
        firstLabelDom.innerHTML = FIRST_STR_JA;
        firstPlusLabelDom.innerHTML = FIRSTPLIS_STR_JA;
        secondLabelDom.innerHTML = SECOND_STR_JA;
        thirdLabelDom.innerHTML = THIRD_STR_JA;
        opendirButtonDom.innerHTML = OPENDIR_STR_JA;
        extraDom.innerHTML = INTRO_STR_JA;
        extraButtonDom.innerHTML = INTRO_STR_JA;
        configDom.innerHTML = CONFIG_STR_JA;
        configButtonDom.innerHTML = CONFIG_STR_JA;
        exitButtonDom.innerHTML = EXIT_STR_JA;
        document.documentElement.setAttribute("lang", 'ja');
        // english
      } else {
        document.title = APPNAME_STR_EN;
        maintitleDom.innerHTML = APPNAME_STR_EN;
        extractDom.innerHTML = EXTRACT_STR_EN;
        extractButtonDom.innerHTML = EXTRACT_STR_EN;
        modifyDom.innerHTML = MODIFY_STR_EN;
        modifyButtonDom.innerHTML = MODIFY_STR_EN;
        renameDom.innerHTML = RENAME_STR_EN;
        renameButtonDom.innerHTML = RENAME_STR_EN;
        splitDom.innerHTML = SPLIT_STR_EN;
        splitButtonDom.innerHTML = SPLIT_STR_EN;
        firstLabelDom.innerHTML = FIRST_STR_EN;
        firstPlusLabelDom.innerHTML = FIRSTPLIS_STR_EN;
        secondLabelDom.innerHTML = SECOND_STR_EN;
        thirdLabelDom.innerHTML = THIRD_STR_EN;
        opendirButtonDom.innerHTML = OPENDIR_STR_EN;
        extraDom.innerHTML = INTRO_STR_EN;
        extraButtonDom.innerHTML = INTRO_STR_EN;
        configDom.innerHTML = CONFIG_STR_EN;
        configButtonDom.innerHTML = CONFIG_STR_EN;
        exitButtonDom.innerHTML = EXIT_STR_EN;
        document.documentElement.setAttribute("lang", 'en');
      }
    }
  </script>
</body>

</html>
