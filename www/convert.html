<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <title>Aozora Toolkit</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline';">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/button.css">
</head>

<body>
  <h1 id="maintitle">Aozora Converter</h1>
  <div class="operation_area">
    <button id="open_button" class="button-g button-6 button-wide" value="open" onclick="gotoOpen()">Open</button>
  </div>
  <hr>
  <div class="operation_area">
    <button id="selectdir_button" class="button-g button-wide" value="selectdir" onclick="gotoSelectDir();">Select
      Directory</button>
  </div>
  <div class="operation_area">
    <h3 id="converter">Convert</h3>
    <label id="converttolabel" for="convertto">convertto</label>
    <div>
      <input type="radio" id="m4a" name="convert" value="m4a">
      <label for="m4a">m4a</label>
    </div>
    <div>
      <input type="radio" id="flac" name="convert" value="flac">
      <label for="flac">flac</label>
    </div>
    <label id="qualitylabel" for="quality">quality</label>
    <input type="number" id="quality" name="quality" min="48" max="320" value="92" /><br><br>
    <label id="samplingratelabel" for="samplingrate">sampling rate</label>
    <select name="samplingrate" id="samplingrate">
      <option value="11025">11025 Hz</option>
      <option value="22050">22050 Hz</option>
      <option value="44100" selected>44100 Hz</option>
      <option value="88200">88200 Hz</option>
      <option value="96000">96000 Hz</option>
      <option value="192000">192000 Hz</option>
    </select><br><br>
    <button id="convert_button" class="button-g button-wide" value="convert" onclick="gotoConvert();">Convert</button>
  </div>
  <div class="operation_area">
    <h3 id="status">Status</h3>
    <div id="statusarea"></div>
  </div>
  <hr>
  <div class="operation_area">
    <button id="top_button" class="button-g button-wide" value="top"
      onclick="transfer('top_page');">Top</button><br><br>
  </div>
  <div class="exit_area">
    <button id="exit_button" class="button-g button-1 button-wide" value="exit"
      onclick="transfer('exit_page');">Exit</button>
  </div>
  <div class="operation_area">
    <div id="error" class="red"></div>
  </div>
  <footer>
    <p><small>&copy; 2026 Nthree All Rights Reserved. </small></p>
  </footer>

  <script charset="UTF-8">
    /// japanese
    // common
    const APPNAME_STR_JA = '青空ツールキット';
    const PAGENAME_STR_JA = '青空コンバータ';
    const OPENDIR_STR_JA = 'フォルダ開く';
    const STATUS_STR_JA = 'ステータス';
    const GOTOTOP_STR_JA = 'トップに戻る';
    const EXIT_STR_JA = '終了';
    // converting
    const CONVERTER_STR_JA = 'ファイル変換';
    const SELECTDIR_STR_JA = 'フォルダ選択';
    const QUALITY_STR_JA = '音声品質';
    const SAMPLINGRATE_STR_JA = 'サンプリング周波数';
    const CONVERTTO_STR_JA = '変換先形式名';
    const CONVERT_STR_JA = 'ファイル変換';

    /// english
    // common
    const APPNAME_STR_EN = 'Aozora Toolkit';
    const PAGENAME_STR_EN = 'Aozora Converter';
    const OPENDIR_STR_EN = 'OpenDir';
    const STATUS_STR_EN = 'Status';
    const GOTOTOP_STR_EN = 'Goto Top';
    const EXIT_STR_EN = 'Exit';
    // converting
    const CONVERTER_STR_EN = 'Convert';
    const SELECTDIR_STR_EN = 'Select Directory';
    const QUALITY_STR_EN = 'quality';
    const SAMPLINGRATE_STR_EN = 'sampling rate';
    const CONVERTTO_STR_EN = 'ConvertTo';
    const CONVERT_STR_EN = 'Convert';

    /// doms
    // common
    const maintitleDom = document.getElementById("maintitle");
    const opendirButtonDom = document.getElementById('open_button');
    const statusDom = document.getElementById('status');
    const statusAreaDom = document.getElementById('statusarea');
    const errorDom = document.getElementById('error');
    const topButtonDom = document.getElementById('top_button');
    const exitButtonDom = document.getElementById('exit_button');
    // converting
    const converterDom = document.getElementById('converter');
    const selectdirButtonDom = document.getElementById('selectdir_button');
    const converttolabelDom = document.getElementById('converttolabel');
    const convertButtonDom = document.getElementById('convert_button');
    const qualitylabelDom = document.getElementById('qualitylabel');
    const qualityDom = document.getElementById('quality');
    const samplingratelabelDom = document.getElementById('samplingratelabel');
    const samplingrateDom = document.getElementById('samplingrate');

    /// ipc
    // before ready
    window.api.send("beforeready");

    // be ready
    window.api.on("ready", arg => {
      console.log('ready');
      // change language
      changeLanguage(arg);
    });

    // update status
    window.api.on('statusUpdate', arg => {
      try {
        console.log(arg);
        // status 
        statusAreaDom.innerHTML = arg.status;

      } catch (e) {
        // error
        console.log(e);
      }
    });

    // update error
    window.api.on('errorUpdate', arg => {
      try {
        console.log(arg);
        // error 
        errorDom.innerHTML = arg;

      } catch (e) {
        // error
        console.log(e);
      }
    });

    /// converting
    // start selectdir
    const gotoSelectDir = () => {
      try {
        console.log('select dir');
        // directory selected
        const tmpSelectedDir = selectdirDom.value;
        // selectdir
        window.api.send('selectdir', tmpSelectedDir);

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // start converting
    const gotoConvert = () => {
      try {
        console.log('converting');
        // get checked
        const checkedValue = document.querySelector("input[name='convert']:checked").value;
        // send obj
        const sendobj = {
          quality: qualityDom.value,
          rate: samplingrateDom.value,
          type: checkedValue,
        }
        // convert
        window.api.send('convert', sendobj);

      } catch (e) {
        // error
        console.log(e);
      }
    }

    /// common
    // page transfer
    const transfer = channel => {
      try {
        // transfer
        window.api.send("page", channel);

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // goto open dir
    const gotoOpen = () => {
      try {
        // open
        window.api.send('open');

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // change language
    const changeLanguage = lang => {
      // japanese
      if (lang == 'japanese') {
        document.title = APPNAME_STR_JA;
        maintitleDom.innerHTML = PAGENAME_STR_JA;
        converterDom.innerHTML = CONVERTER_STR_JA;
        selectdirButtonDom.innerHTML = SELECTDIR_STR_JA;
        converttolabelDom.innerHTML = CONVERTTO_STR_JA;
        convertButtonDom.innerHTML = CONVERT_STR_JA;
        qualitylabelDom.innerHTML = QUALITY_STR_JA;
        samplingratelabelDom.innerHTML = SAMPLINGRATE_STR_JA;
        opendirButtonDom.innerHTML = OPENDIR_STR_JA;
        statusDom.innerHTML = STATUS_STR_JA;
        topButtonDom.innerHTML = GOTOTOP_STR_JA;
        exitButtonDom.innerHTML = EXIT_STR_JA;
        document.documentElement.setAttribute("lang", 'ja');
        // english
      } else {
        document.title = APPNAME_STR_EN;
        maintitleDom.innerHTML = PAGENAME_STR_EN;
        converterDom.innerHTML = CONVERTER_STR_EN;
        selectdirButtonDom.innerHTML = SELECTDIR_STR_EN;
        converttolabelDom.innerHTML = CONVERTTO_STR_EN;
        convertButtonDom.innerHTML = CONVERT_STR_EN;
        qualitylabelDom.innerHTML = QUALITY_STR_EN;
        samplingratelabelDom.innerHTML = SAMPLINGRATE_STR_EN;
        opendirButtonDom.innerHTML = OPENDIR_STR_EN;
        statusDom.innerHTML = STATUS_STR_EN;
        topButtonDom.innerHTML = GOTOTOP_STR_EN;
        exitButtonDom.innerHTML = EXIT_STR_EN;
        document.documentElement.setAttribute("lang", 'en');
      }
    }
  </script>
</body>

</html>
