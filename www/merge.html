<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <title>Aozora Toolkit</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline';">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/button.css">
</head>

<body>
  <h1 id="maintitle">Aozora Merger</h1>
  <div class="operation_area">
    <button id="open_button" class="button-g button-6 button-wide" value="open" onclick="gotoOpen()">Open</button>
  </div>
  <hr>
  <div class="operation_area">
    <button id="selectdir_button" class="button-g button-wide" value="selectdir" onclick="gotoSelectDir();">Select
      Directory</button>
  </div>
  <div class="operation_area">
    <button id="merge_button" class="button-g button-4 button-wide" value="merge" onclick="gotoMerge();">Merge</button>
  </div><br><br>
  <div class="operation_area">
    <button id="delete_button" class="button-g button-wide" value="delete" onclick="gotoDelete();">Delete</button>
  </div>
  <div class="operation_area">
    <h3 id="status">Status</h3>
    <div id="statusarea"></div>
  </div>
  <hr>
  <div class="operation_area">
    <button id="top_button" class="button-g button-wide" value="top"
      onclick="transfer('top_page');">Top</button><br><br>
  </div>
  <div class="exit_area">
    <button id="exit_button" class="button-g button-1 button-wide" value="exit"
      onclick="transfer('exit_page');">Exit</button>
  </div>
  <div class="operation_area">
    <div id="error" class="red"></div>
  </div>
  <footer>
    <p><small>&copy; 2026 Nthree All Rights Reserved. </small></p>
  </footer>

  <script charset='UTF-8'>
    /// japanese
    // common
    const APPNAME_STR_JA = '青空ツールキット';
    const PAGENAME_STR_JA = '青空マージャ―';
    const OPENDIR_STR_JA = 'フォルダ開く';
    const STATUS_STR_JA = 'ステータス';
    const GOTOTOP_STR_JA = 'トップに戻る';
    const EXIT_STR_JA = '終了';
    /// merging
    const MERGE_STR_JA = 'ファイル結合';
    const DELETE_STR_JA = 'クリア';
    const SELECTDIR_STR_JA = 'フォルダ選択';

    /// english
    // common
    const APPNAME_STR_EN = 'Aozora Toolkit';
    const PAGENAME_STR_EN = 'Aozora Merger';
    const OPENDIR_STR_EN = 'OpenDir';
    const STATUS_STR_EN = 'Status';
    const GOTOTOP_STR_EN = 'Goto Top';
    const EXIT_STR_EN = 'Exit';
    /// merging
    const MERGE_STR_EN = 'Merge';
    const DELETE_STR_EN = 'Delete';
    const SELECTDIR_STR_EN = 'Select Directory';

    /// doms
    // common
    const maintitleDom = document.getElementById('maintitle');
    const opendirButtonDom = document.getElementById('open_button');
    const statusDom = document.getElementById('status');
    const statusAreaDom = document.getElementById('statusarea');
    const errorDom = document.getElementById('error');
    const topButtonDom = document.getElementById('top_button');
    const exitButtonDom = document.getElementById('exit_button');
    // merging
    const mergeButtonDom = document.getElementById('merge_button');
    const deleteButtonDom = document.getElementById('delete_button');
    const selectdirButtonDom = document.getElementById('selectdir_button');

    /// ipc
    // before ready
    window.api.send('beforeready');

    // be ready
    window.api.on('ready', arg => {
      console.log('ready');
      // change language
      changeLanguage(arg);
    });

    // update status
    window.api.on('statusUpdate', arg => {
      try {
        console.log(arg);
        // status 
        statusAreaDom.innerHTML = arg.status + '\n' + arg.target;

      } catch (e) {
        // error
        console.log(e);
      }
    });

    // update error
    window.api.on('errorUpdate', arg => {
      try {
        console.log(arg);
        // error 
        errorDom.innerHTML = arg;

      } catch (e) {
        // error
        console.log(e);
      }
    });

    /// merging
    // start selectdir
    const gotoSelectDir = () => {
      try {
        console.log('select dir');
        // selectdir
        window.api.send('selectdir');

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // start merging
    const gotoMerge = () => {
      try {
        console.log('merging');
        // merge
        window.api.send('merge');

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // start deleting
    const gotoDelete = () => {
      try {
        console.log('deleting');
        // delete
        window.api.send('delete');

      } catch (e) {
        // error
        console.log(e);
      }
    }

    /// common
    // page transfer
    const transfer = channel => {
      try {
        // transfer
        window.api.send('page', channel);

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // goto open dir
    const gotoOpen = () => {
      try {
        // scrape
        window.api.send('open', 'output');

      } catch (e) {
        // error
        console.log(e);
      }
    }

    // change language
    const changeLanguage = lang => {
      // japanese
      if (lang == 'japanese') {
        document.title = APPNAME_STR_JA;
        maintitleDom.innerHTML = PAGENAME_STR_JA;
        opendirButtonDom.innerHTML = OPENDIR_STR_JA;
        selectdirButtonDom.innerHTML = SELECTDIR_STR_JA;
        mergeButtonDom.innerHTML = MERGE_STR_JA;
        deleteButtonDom.innerHTML = DELETE_STR_JA;
        statusDom.innerHTML = STATUS_STR_JA;
        topButtonDom.innerHTML = GOTOTOP_STR_JA;
        exitButtonDom.innerHTML = EXIT_STR_JA;
        document.documentElement.setAttribute('lang', 'ja');
        // english
      } else {
        document.title = APPNAME_STR_EN;
        maintitleDom.innerHTML = PAGENAME_STR_EN;
        opendirButtonDom.innerHTML = OPENDIR_STR_EN;
        selectdirButtonDom.innerHTML = SELECTDIR_STR_EN;
        mergeButtonDom.innerHTML = MERGE_STR_EN;
        deleteButtonDom.innerHTML = DELETE_STR_EN;
        statusDom.innerHTML = STATUS_STR_EN;
        topButtonDom.innerHTML = GOTOTOP_STR_EN;
        exitButtonDom.innerHTML = EXIT_STR_EN;
        document.documentElement.setAttribute('lang', 'en');
      }
    }
  </script>
</body>

</html>
